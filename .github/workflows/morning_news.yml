name: Morning News Bot

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

# 💡 追加: GitHub Pagesへのデプロイに必要な権限を明示
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install google-generativeai requests feedparser python-dotenv

    - name: Run script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
      run: python main.py

    # 💡 追加: 生成された index.html を自動的に GitHub Pages にアップロード・公開する
    - name: Upload artifact for Pages
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.' # リポジトリのルートにある index.html を対象にする

    - name: Deploy to GitHub Pages
      uses: actions/deploy-pages@v4
